# Sample nginx config for the FACET / BACKBONE game server.
#
# Assumes the app runs on 127.0.0.1:8080 (match your container's PORT) and you
# have a valid public TLS cert. Replace games.example.com and the cert paths.
#
# App-specific notes (why these directives matter here):
#   * X-Real-IP is REQUIRED — the app rate-limits per client IP and reads it
#     from this header when FACET_TRUST_PROXY=1. Without it, every user looks
#     like one IP (nginx) and the limits misfire.
#   * proxy_read_timeout must exceed the app's ~25s long-poll hold, or live
#     game updates get cut off mid-request.
#   * The app is long-poll over plain HTTP — NOT WebSockets — so no
#     Upgrade/Connection juggling is needed.
#   * client_max_body_size matches the app's 64 KB body cap so oversized
#     requests are rejected at the edge.

# --- put these two zones in the http{} context (e.g. /etc/nginx/nginx.conf) ---
limit_req_zone  $binary_remote_addr  zone=facet_api:10m  rate=20r/s;
limit_conn_zone $binary_remote_addr  zone=facet_conn:10m;

# --- redirect all plain HTTP to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name games.example.com;
    return 301 https://$host$request_uri;
}

# --- main HTTPS server ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;                          # nginx < 1.25.1: use "listen 443 ssl http2;"
    server_name games.example.com;

    ssl_certificate     /etc/ssl/games.example.com/fullchain.pem;
    ssl_certificate_key /etc/ssl/games.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;     # modern clients pick well; see Mozilla SSL config generator
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # reject bodies larger than the app accepts, at the edge
    client_max_body_size 64k;

    # coarse volumetric guards (the app also limits per-user; this is edge defense)
    limit_conn facet_conn 20;

    # security headers (safe with this app's markup)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header Referrer-Policy           no-referrer always;
    # Optional CSP: the SPA uses inline scripts/styles, so a strict policy needs
    # 'unsafe-inline'. Test before enabling.
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    gzip on;
    gzip_min_length 512;
    gzip_types application/javascript application/json application/manifest+json
               text/css text/html image/svg+xml;

    # proxy settings inherited by both locations below
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;                 # <-- required
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout    75s;          # > the app's 25s long-poll
    # request buffering stays ON (default): neutralises slowloris against the app

    # extra per-IP request-rate cap on the API surface
    location /api/ {
        limit_req zone=facet_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    # everything else (SPA HTML, engine JS, service workers, manifests, icons)
    location / {
        proxy_pass http://127.0.0.1:8080;
    }
}

# --------------------------------------------------------------------------
# OPTIONAL: serve static assets directly from nginx instead of proxying them.
# Marginal benefit here — the PWA service worker already caches static assets
# client-side after first load, so origin static traffic is minimal. Only worth
# it if nginx has filesystem access to the app's docs/ directory. If you do:
