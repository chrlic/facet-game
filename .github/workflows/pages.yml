name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp service worker version
        run: |
          VERSION="v-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          sed -i "s/const CACHE = \"facet-v[0-9]*\"/const CACHE = \"facet-${VERSION}\"/" docs/sw.js
          sed -i "s/const CACHE = \"backbone-v[0-9]*\"/const CACHE = \"backbone-${VERSION}\"/" docs/bb-sw.js
          echo "Cache version: facet-${VERSION} / backbone-${VERSION}"
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
